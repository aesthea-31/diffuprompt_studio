name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # または master。デプロイ対象のブランチ名

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ★ここで JavaScript ファイル内の文字列を実際の秘密鍵に置換します
      - name: Inject Firebase API Key
        run: |
          sed -i 's/NEXT_PUBLIC_FIREBASE_API_KEY/${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}/g' firebase_config.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # リポジトリのルート（index.htmlがある場所）をアップロード

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
