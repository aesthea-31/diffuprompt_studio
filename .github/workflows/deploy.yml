name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # または master。デプロイ対象のブランチ名

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

     # ★ここで Firebase と Gemini の APIキーをそれぞれのファイルに注入します
      # ※ もしGeminiの設定を別のJSファイル（例: gemini_config.js）に書いている場合は、ファイル名を変更してください。
      # ※ もし同じ firebase_config.js 内にまとめている場合は、両方とも firebase_config.js にしてください。
      - name: Inject API Key
        run: |
          sed -i 's/NEXT_PUBLIC_FIREBASE_API_KEY/${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}/g' firebase_config.js
          sed -i 's/NEXT_PUBLIC_GEMINI_API_KEY/${{ secrets.NEXT_PUBLIC_GEMINI_API_KEY }}/g' gemini_config.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # リポジトリのルート（index.htmlがある場所）をアップロード

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
